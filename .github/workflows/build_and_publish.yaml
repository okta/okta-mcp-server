name: Build and publish docker image

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  Build_and_Push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: projects/1042430885196/locations/global/workloadIdentityPools/github-pool/providers/github-pool-provider
          # Use your existing service account logic
          service_account: ${{ github.event_name == 'pull_request' && vars.GCP_SERVICE_ACCOUNT_GAR_PUBLISHER_DEV || vars.GCP_SERVICE_ACCOUNT_GAR_PUBLISHER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push
        run: |
          # 1. Define the Image Name
          IMAGE_NAME="okta-mcp-server"
          PROJECT_ID="clover-sre-001"
          
          # 2. Determine if this is a PR or a Merge to Main
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REPO="gcr.io/$PROJECT_ID/$IMAGE_NAME-dev"
          else
            REPO="gcr.io/$PROJECT_ID/$IMAGE_NAME"
          fi

          # 3. Define Tags
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          
          echo "Building and pushing to $REPO"

          # 4. Build and Push using Buildx
          # This assumes Dockerfile is in the root (./Dockerfile)
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag "$REPO:latest" \
            --tag "$REPO:$SHA" \
            --file ./Dockerfile .
