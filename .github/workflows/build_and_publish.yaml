name: Build and publish docker image

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  Build_and_Push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: projects/1042430885196/locations/global/workloadIdentityPools/github-pool/providers/github-pool-provider
          service_account: ${{ github.event_name == 'pull_request' && vars.GCP_SERVICE_ACCOUNT_GAR_PUBLISHER_DEV || vars.GCP_SERVICE_ACCOUNT_GAR_PUBLISHER }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push
        run: |
          IMAGE_NAME="okta-mcp-server"
          PROJECT_ID="clover-sre-001"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REPO="gcr.io/$PROJECT_ID/$IMAGE_NAME-dev"
          else
            REPO="gcr.io/$PROJECT_ID/$IMAGE_NAME"
          fi

          SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "Building and pushing to $REPO"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag "$REPO:latest" \
            --tag "$REPO:$SHA" \
            --file ./Dockerfile .
