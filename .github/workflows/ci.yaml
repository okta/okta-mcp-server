name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install packages
        run: uv pip install --system .

      - name: Prepare requirements
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Run tests
        run: uv run pytest tests/ -v --junitxml=test-results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  snyk-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - name: Prepare requirements
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          pip install -r requirements.txt

      - name: Run Snyk monitor
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects --skip-unresolved

  reversing-labs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system . --target _vendor/

      - name: Download Reversing Labs scanner
        env:
          DSO_RLSECURE_TOKEN: ${{ secrets.DSO_RLSECURE_TOKEN }}
        run: |
          curl --fail --show-error --location \
            https://dso-resources.oktasecurity.com/scanner \
            -H "x-api-key: $DSO_RLSECURE_TOKEN" \
            --output rl_wrapper-0.0.2+35ababa-py3-none-any.whl

          # Verify the downloaded file is a valid wheel
          file rl_wrapper-0.0.2+35ababa-py3-none-any.whl
          if ! file rl_wrapper-0.0.2+35ababa-py3-none-any.whl | grep -q "Zip archive"; then
            echo "ERROR: Downloaded file is not a valid wheel archive"
            cat rl_wrapper-0.0.2+35ababa-py3-none-any.whl
            exit 1
          fi

      - name: Install RL wrapper
        run: pip install ./rl_wrapper-0.0.2+35ababa-py3-none-any.whl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ARN }}
          aws-region: us-east-1

      - name: Run Reversing Labs scanner
        run: |
          rl-wrapper \
            --artifact $GITHUB_WORKSPACE \
            --name ${{ github.event.repository.name }} \
            --version ${{ github.sha }} \
            --repository ${{ github.repository }} \
            --commit ${{ github.sha }} \
            --build-env "github-actions" \
            --suppress_output
